version: "3.9"

services:
  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  web:
    build: .
    ports:
      - "3000:80"
    depends_on:
      - db
      - redis
    env_file:
      - .env

volumes:
  postgres_data: